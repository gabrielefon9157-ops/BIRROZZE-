<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muro delle Perle — Birrozze</title>
  <meta name="description" content="Le battute memorabili e le gaffe del gruppo durante la vacanza studio, scritte su post-it colorati.">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--cream-deep); }

    /* ---- FORM PERLA ---- */
    .perla-form-wrap {
      background: var(--foam);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }
    .perla-form-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--espresso);
      margin-bottom: var(--space-md);
    }
    .perla-form-row {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .perla-form-row .field { flex: 1; min-width: 200px; }
    .perla-form-row .field-author { flex: 0 0 160px; }

    /* Color Swatches */
    .swatch-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: var(--space-sm);
    }
    .swatch-row label { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-soft); }
    .swatch {
      width: 26px;
      height: 26px;
      border-radius: var(--r-sm);
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.selected { border-color: var(--espresso); transform: scale(1.15); }

    /* ---- POST-IT WALL ---- */
    .postit-wall {
      columns: 1;
      column-gap: var(--space-lg);
    }
    @media (min-width: 540px) { .postit-wall { columns: 2; } }
    @media (min-width: 860px) { .postit-wall { columns: 3; } }

    .post-it {
      break-inside: avoid;
      margin-bottom: var(--space-lg);
      padding: var(--space-lg);
      position: relative;
      transform: rotate(var(--rot, 0deg));
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s;
      box-shadow: 0 4px 14px rgba(42,35,24,.06);
      cursor: default;
      border-radius: 1px;
    }
    /* Tape detail */
    .post-it::before {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      width: 60px;
      height: 16px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(0,0,0,.04);
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .post-it:hover {
      transform: translateY(-6px) rotate(0deg) scale(1.03);
      box-shadow: 0 16px 36px rgba(42,35,24,.11);
      z-index: 5;
    }
    .post-it-text {
      font-family: var(--font-hand);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--espresso);
      word-break: break-word;
    }
    .post-it-author {
      font-family: var(--font-hand);
      font-size: 17px;
      text-align: right;
      margin-top: var(--space-md);
      opacity: .75;
      color: var(--espresso);
    }
    .post-it-author::before { content: "— "; }
    .post-it-remove {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 12px;
      color: rgba(0,0,0,.25);
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0;
      transition: opacity .15s, color .15s;
      font-family: var(--font-body);
    }
    .post-it:hover .post-it-remove { opacity: 1; }
    .post-it-remove:hover { color: var(--copper); }

    .wall-empty {
      text-align: center;
      padding: 60px 0;
      color: var(--text-mute);
    }
    .wall-empty p { margin-top: 12px; font-size: 14px; }

    /* ---- COUNT BADGE ---- */
    .perla-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--amber);
      color: var(--espresso);
      border-radius: 99px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      padding: 2px 10px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <!-- TOPNAV -->
  <nav class="topnav" role="navigation" aria-label="Navigazione principale">
    <div class="topnav-inner">
      <a href="index.html" class="nav-brand">Bir<span>rozze</span></a>
      <div class="nav-links">
        <a href="consumazioni.html" class="nav-link" data-page="consumazioni.html">Bevute</a>
        <a href="classifica.html"    class="nav-link" data-page="classifica.html">Classifica</a>
        <a href="spese.html"         class="nav-link" data-page="spese.html">Spese</a>
        <a href="galleria.html"      class="nav-link" data-page="galleria.html">Galleria</a>
        <a href="perle.html"         class="nav-link" data-page="perle.html">Perle</a>
        <a href="oscar.html"         class="nav-link" data-page="oscar.html">Oscar</a>
        <a href="prossima.html"      class="nav-link" data-page="prossima.html">Tappa</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="page-hero">
    <span class="kicker">Bacheca Goliardica</span>
    <h1>Muro delle Perle <span id="perlaCount" class="perla-count">0</span></h1>
    <p>Scrivete qui le citazioni memorabili, i tormentoni e le gaffe nate durante il viaggio. Prima che la notte le cancelli!</p>
  </header>

  <main class="page-wrap">

    <!-- FORM AGGIUNTA PERLA -->
    <div class="perla-form-wrap fade-up">
      <div class="perla-form-title">Aggiungi una Perla</div>
      <form id="perlaForm">
        <div class="perla-form-row">
          <div class="field">
            <label for="perlaText">La Perla</label>
            <input type="text" id="perlaText" placeholder="«Scrivi la battuta qui...»" required maxlength="200" aria-label="Testo della perla">
          </div>
          <div class="field field-author">
            <label for="perlaAuthor">Chi l'ha detta?</label>
            <input type="text" id="perlaAuthor" placeholder="Nome..." required maxlength="20" aria-label="Autore della perla">
          </div>
          <div style="align-self:flex-end;">
            <button type="submit" class="btn btn-primary">Appendi</button>
          </div>
        </div>
        <div class="swatch-row">
          <label>Colore:</label>
          <div id="swatchRow"></div>
        </div>
      </form>
    </div>

    <!-- POST-IT WALL -->
    <section aria-label="Muro delle perle del gruppo">
      <div class="postit-wall" id="postitWall"></div>
    </section>

  </main>

  <footer class="page-footer">
    <div class="page-wrap">Fatto con cura per la vacanza studio &middot; <strong>Birrozze v6.0</strong></div>
  </footer>

  <div class="toast-container" aria-live="polite"></div>

  <script src="shared.js"></script>
  <script>
  (function () {
    "use strict";
    var BS = window.BirrozzeState;
    BS.load();
    BS.markActiveNav();
    BS.initReveal();

    var COLORS = [
      { name: "giallo",  hex: "#FFF9D0" },
      { name: "corallo", hex: "#FFE4DC" },
      { name: "menta",   hex: "#D8F7E5" },
      { name: "cielo",   hex: "#D8EEF9" },
      { name: "lilla",   hex: "#EDE0FF" },
      { name: "rosa",    hex: "#FFE0EE" }
    ];
    var selectedColor = COLORS[0].hex;

    /* ---- Swatches ---- */
    function renderSwatches() {
      var html = COLORS.map(function (c) {
        var sel = c.hex === selectedColor ? " selected" : "";
        return '<button type="button" class="swatch' + sel + '" style="background:' + c.hex + ';" data-hex="' + c.hex + '" aria-label="Colore ' + c.name + '" title="' + c.name + '"></button>';
      }).join('');
      document.getElementById("swatchRow").innerHTML = html;
    }

    /* ---- Post-It Wall ---- */
    function renderWall() {
      var state = BS.get();
      document.getElementById("perlaCount").textContent = state.perle.length;

      if (state.perle.length === 0) {
        document.getElementById("postitWall").innerHTML =
          '<div class="wall-empty">' +
            '<div style="font-size:56px;">📝</div>' +
            '<p>Il Muro è vuoto. Siate la prima perla della serata!</p>' +
          '</div>';
        return;
      }

      var html = state.perle.map(function (p) {
        return '<div class="post-it" style="background:' + (p.c || "#FFF9D0") + '; --rot:' + (p.rot || 0) + 'deg;">' +
          '<button class="post-it-remove" data-id="' + p.id + '" aria-label="Rimuovi questa perla">togli</button>' +
          '<div class="post-it-text">' + BS.esc(p.text) + '</div>' +
          (p.author ? '<div class="post-it-author">' + BS.esc(p.author) + '</div>' : '') +
        '</div>';
      }).join('');

      document.getElementById("postitWall").innerHTML = html;
    }

    /* ---- Events ---- */
    document.getElementById("swatchRow").addEventListener("click", function (e) {
      var btn = e.target.closest(".swatch");
      if (btn) { selectedColor = btn.getAttribute("data-hex"); renderSwatches(); }
    });

    document.getElementById("perlaForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var txt  = document.getElementById("perlaText").value.trim();
      var auth = document.getElementById("perlaAuthor").value.trim();
      if (!txt || !auth) return;

      var state = BS.get();
      state.perle.unshift({
        id:     BS.uid(),
        text:   txt,
        author: auth,
        c:      selectedColor,
        rot:    (Math.random() * 7 - 3.5).toFixed(1)
      });
      BS.save();
      document.getElementById("perlaText").value   = "";
      document.getElementById("perlaAuthor").value = "";
      renderWall();
      BS.toast("Perla appesa al muro!");
    });

    document.getElementById("postitWall").addEventListener("click", function (e) {
      var btn = e.target.closest(".post-it-remove");
      if (btn) {
        var id = btn.getAttribute("data-id");
        var state = BS.get();
        state.perle = state.perle.filter(function (p) { return p.id !== id; });
        BS.save();
        renderWall();
      }
    });

    /* ---- Init ---- */
    renderSwatches();
    renderWall();

  })();
  </script>
</body>
</html>
