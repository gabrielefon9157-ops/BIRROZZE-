<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oscar della Vacanza — Birrozze</title>
  <meta name="description" content="Vota i compagni di viaggio per i premi più divertenti della vacanza studio. Aggiornamento live.">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--cream); }

    /* ---- OSCAR GRID ---- */
    .oscar-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
    }
    @media (min-width: 620px) { .oscar-grid { grid-template-columns: 1fr 1fr; } }

    .oscar-card {
      background: var(--foam);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s, border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .oscar-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: rgba(227,163,32,.4);
    }

    .oscar-header {
      padding: var(--space-md) var(--space-lg);
      background: var(--amber-pale);
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--amber);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .oscar-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--espresso);
      letter-spacing: -0.01em;
    }
    .oscar-leader {
      flex-shrink: 0;
      background: var(--amber);
      color: var(--espresso);
      border-radius: 99px;
      padding: 3px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .oscar-candidates {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .oscar-row {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: var(--r);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color .2s, transform .2s;
      background: transparent;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }
    .oscar-row:hover { border-color: var(--border-dark); transform: translateX(4px); }
    .oscar-row:active { transform: translateX(4px) scale(.98); }
    .oscar-row.active { border-color: var(--amber-dark); background: rgba(227, 163, 32, 0.05); }
    .oscar-row-bg {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--amber-pale);
      border-radius: var(--r);
      width: 0;
      transition: width .8s cubic-bezier(.16,1,.3,1);
      z-index: 1;
    }
    .oscar-row > * { position: relative; z-index: 2; }
    .oscar-cand-name { font-weight: 500; font-size: 14px; color: var(--text-body); }
    .oscar-cand-votes {
      font-size: 11.5px;
      font-family: var(--font-mono);
      background: var(--sky);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
      color: var(--text-soft);
    }
    .oscar-actions { display: flex; align-items: center; gap: 6px; }
    .oscar-unvote {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--foam);
      color: var(--text-mute);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .oscar-unvote:hover { color: var(--copper); border-color: var(--copper); }
    .oscar-del {
      background: none;
      border: none;
      color: var(--text-mute);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .oscar-del:hover { color: var(--copper); background: rgba(232,85,47,.08); }

    /* ---- ADD OSCAR FORM ---- */
    .add-oscar-form {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-xl);
    }
    .add-oscar-form input { flex: 1; }

    /* ---- STATS SUMMARY (light butter band) ---- */
    .oscar-stats {
      background: var(--butter);
      border: 1.5px solid rgba(227,163,32,.35);
      border-radius: var(--r-xl);
      padding: var(--space-xl) var(--space-lg);
      margin-bottom: var(--space-xl);
      display: flex;
      gap: var(--space-xl);
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: var(--shadow-xs);
    }
    .oscar-stat-item { text-align: center; }
    .oscar-stat-val {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 700;
      color: var(--amber-dark);
      line-height: 1;
    }
    .oscar-stat-lbl {
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-soft);
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- TOPNAV -->
  <nav class="topnav" role="navigation" aria-label="Navigazione principale">
    <div class="topnav-inner">
      <a href="index.html" class="nav-brand">Bir<span>rozze</span></a>
      <div class="nav-links">
        <a href="consumazioni.html" class="nav-link" data-page="consumazioni.html">Bevute</a>
        <a href="classifica.html"    class="nav-link" data-page="classifica.html">Classifica</a>
        <a href="spese.html"         class="nav-link" data-page="spese.html">Spese</a>
        <a href="galleria.html"      class="nav-link" data-page="galleria.html">Galleria</a>
        <a href="perle.html"         class="nav-link" data-page="perle.html">Perle</a>
        <a href="oscar.html"         class="nav-link" data-page="oscar.html">Oscar</a>
        <a href="prossima.html"      class="nav-link" data-page="prossima.html">Tappa</a>
            <!-- Widget avatar utente loggato -->
      <div class="nav-user" id="navUser">
        <button class="nav-avatar-btn" id="navAvatarBtn" aria-label="Profilo utente" aria-expanded="false" aria-haspopup="true">
          <span id="navAvatarInitial">?</span>
          <img id="navAvatarImg" alt="Foto profilo">
        </button>
        <div class="nav-user-dropdown" id="navDropdown" role="menu">
          <div class="nav-dd-header">
            <div class="nav-dd-avatar" id="navDdAvatar">
              <span id="navDdInitial"></span>
              <img id="navDdImg" alt="">
            </div>
            <div>
              <div class="nav-dd-name" id="navDdName"></div>
              <div class="nav-dd-email" id="navDdEmail"></div>
            </div>
          </div>
          <button class="nav-dd-btn" id="navChangeAvatarBtn" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Cambia foto profilo
          </button>
          <input type="file" id="navAvatarFileInput" accept="image/*" style="display:none">
          <button class="nav-dd-btn danger" id="navLogoutBtn" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Esci (Logout)
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="page-hero">
    <span class="kicker">Premi &amp; Riconoscimenti</span>
    <h1>Oscar della Vacanza</h1>
    <p>Vota i tuoi compagni di viaggio per i premi più divertenti della serata. La classifica si aggiorna in tempo reale.</p>
  </header>

  <main class="page-wrap">

    <!-- STATS BAR -->
    <div class="oscar-stats fade-up" id="oscarStats" aria-label="Statistiche Oscar"></div>

    <!-- OSCAR CARDS -->
    <section aria-label="Categorie Oscar" class="fade-up">
      <div class="oscar-grid" id="oscarGrid"></div>
    </section>

    <!-- ADD CATEGORY -->
    <div class="add-oscar-form fade-up">
      <input type="text" id="newOscarInput" placeholder="Crea una nuova categoria Oscar..." maxlength="60" aria-label="Nuova categoria Oscar">
      <button class="btn btn-primary" id="addOscarBtn">Crea</button>
    </div>

  </main>

  <footer class="page-footer">
    <div class="page-wrap">Fatto con cura per la vacanza studio &middot; <strong>Birrozze v6.0</strong></div>
  </footer>

  <div class="toast-container" aria-live="polite"></div>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script>
  (function () {
    "use strict";
    var BS = window.BirrozzeState;
    BS.load();
    BS.markActiveNav();
    BS.initReveal();

    /* ---- Stats ---- */
    function renderStats() {
      var state = BS.get();
      var totalVotes = 0;
      var catCount   = state.oscars.length;

      state.oscars.forEach(function (o) {
        for (var pid in o.votes) totalVotes += o.votes[pid];
      });

      // Find most decorated person
      var tally = {};
      state.crew.forEach(function (p) { tally[p.id] = 0; });
      state.oscars.forEach(function (o) {
        var maxV = 0, leadId = null;
        for (var pid in o.votes) {
          if (o.votes[pid] > maxV) { maxV = o.votes[pid]; leadId = pid; }
        }
        if (leadId) tally[leadId] = (tally[leadId] || 0) + 1;
      });
      var mvpId = null, mvpWins = 0;
      for (var pid in tally) { if (tally[pid] > mvpWins) { mvpWins = tally[pid]; mvpId = pid; } }
      var mvpName = "—";
      state.crew.forEach(function (p) { if (p.id === mvpId) mvpName = p.name; });

      document.getElementById("oscarStats").innerHTML =
        '<div class="oscar-stat-item">' +
          '<div class="oscar-stat-val">' + catCount + '</div>' +
          '<div class="oscar-stat-lbl">Categorie</div>' +
        '</div>' +
        '<div class="oscar-stat-item">' +
          '<div class="oscar-stat-val">' + totalVotes + '</div>' +
          '<div class="oscar-stat-lbl">Voti totali</div>' +
        '</div>' +
        '<div class="oscar-stat-item">' +
          '<div class="oscar-stat-val">' + BS.esc(mvpName) + '</div>' +
          '<div class="oscar-stat-lbl">Più premiato</div>' +
        '</div>';
    }

    /* ---- Oscar Grid ---- */
    function renderOscars() {
      var state = BS.get();
      var activeVoterId = BS.getActiveProfileId();

      var html = state.oscars.map(function (o) {
        var tally = {};
        var tot = 0;
        state.crew.forEach(function (p) { tally[p.id] = 0; });
        for (var voterId in o.votes) {
          var candId = o.votes[voterId];
          if (tally[candId] !== undefined) {
            tally[candId]++;
            tot++;
          }
        }

        var leadId = null, leadV = 0;
        for (var candId in tally) {
          if (tally[candId] > leadV) { leadV = tally[candId]; leadId = candId; }
        }

        var leaderName = "—";
        state.crew.forEach(function (p) { if (p.id === leadId) leaderName = p.name; });

        var rows = state.crew.map(function (p) {
          var v   = tally[p.id] || 0;
          var pct = tot > 0 ? (v / tot * 100) : 0;
          var hasVotedForThis = o.votes[activeVoterId] === p.id;
          
          return '<div class="oscar-row' + (hasVotedForThis ? ' active' : '') + '" role="button" tabindex="0" data-oscar="' + o.id + '" data-cand="' + p.id + '" aria-label="Vota ' + BS.esc(p.name) + '">' +
            '<div class="oscar-row-bg" style="width:' + pct + '%"></div>' +
            '<span class="oscar-cand-name">' + BS.esc(p.name) + '</span>' +
            '<span class="oscar-actions">' +
              '<span class="oscar-cand-votes">' + v + ' voti</span>' +
              (hasVotedForThis ? '<button class="oscar-unvote" data-unvote-oscar="' + o.id + '" title="Togli il tuo voto" aria-label="Togli il tuo voto">−</button>' : '') +
            '</span>' +
          '</div>';
        }).join('');

        return '<div class="oscar-card fade-up">' +
          '<div class="oscar-header">' +
            '<div class="oscar-title">' + BS.esc(o.title) + '</div>' +
            '<div class="oscar-leader">' + BS.esc(leaderName) + '</div>' +
            '<button class="oscar-del" data-del="' + o.id + '" title="Elimina categoria" aria-label="Elimina la categoria ' + BS.esc(o.title) + '">×</button>' +
          '</div>' +
          '<div class="oscar-candidates">' + rows + '</div>' +
        '</div>';
      }).join('');

      document.getElementById("oscarGrid").innerHTML = html || '<p style="text-align:center;color:var(--text-mute);grid-column:1/-1;padding:40px 0;">Nessuna categoria Oscar ancora. Creane una qui sotto!</p>';

      BS.initReveal();
    }

    /* ---- Helper per votare ---- */
    function voteOscar(oscarId, candId, voterId) {
      var state = BS.get();
      state.oscars.forEach(function (o) {
        if (o.id === oscarId) {
          o.votes[voterId] = candId;
        }
      });
      BS.save();
      renderOscars();
      renderStats();
      
      var name = "";
      state.crew.forEach(function (p) { if (p.id === candId) name = p.name; });
      BS.toast("Hai votato per " + name + "!");
    }

    /* ---- Events ---- */
    document.getElementById("oscarGrid").addEventListener("click", function (e) {
      // Elimina categoria
      var delBtn = e.target.closest(".oscar-del");
      if (delBtn) {
        var oid = delBtn.getAttribute("data-del");
        var st = BS.get();
        var title = "";
        st.oscars.forEach(function (o) { if (o.id === oid) title = o.title; });
        if (confirm('Eliminare la categoria "' + title + '" e tutti i suoi voti?')) {
          st.oscars = st.oscars.filter(function (o) { return o.id !== oid; });
          BS.save();
          renderOscars();
          renderStats();
        }
        return;
      }

      // Togli un voto (correzione)
      var unvote = e.target.closest(".oscar-unvote");
      if (unvote) {
        e.stopPropagation();
        var uOscar = unvote.getAttribute("data-unvote-oscar");
        var activeVoterId = BS.getActiveProfileId();
        if (activeVoterId) {
          var st2 = BS.get();
          st2.oscars.forEach(function (o) {
            if (o.id === uOscar) {
              delete o.votes[activeVoterId];
            }
          });
          BS.save();
          renderOscars();
          renderStats();
          BS.toast("Voto rimosso.");
        }
        return;
      }

      // Vota
      var btn = e.target.closest(".oscar-row");
      if (!btn) return;
      var oscarId = btn.getAttribute("data-oscar");
      var candId  = btn.getAttribute("data-cand");
      var activeVoterId = BS.getActiveProfileId();
      if (!activeVoterId) {
        BS.promptForProfile(function() {
          var newVoterId = BS.getActiveProfileId();
          if (newVoterId) voteOscar(oscarId, candId, newVoterId);
        });
      } else {
        voteOscar(oscarId, candId, activeVoterId);
      }
    });

    // Voto da tastiera sulle righe (accessibilità)
    document.getElementById("oscarGrid").addEventListener("keydown", function (e) {
      if ((e.key === "Enter" || e.key === " ") && e.target.classList.contains("oscar-row")) {
        e.preventDefault();
        e.target.click();
      }
    });

    document.getElementById("addOscarBtn").addEventListener("click", function () {
      var val = document.getElementById("newOscarInput").value.trim();
      if (!val) return;
      var state = BS.get();
      state.oscars.push({ id: BS.uid(), title: val, votes: {} });
      BS.save();
      document.getElementById("newOscarInput").value = "";
      renderOscars();
      renderStats();
    });

    document.getElementById("newOscarInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") document.getElementById("addOscarBtn").click();
    });

    /* ---- Init ---- */
    renderStats();
    renderOscars();

  })();
  </script>
</body>
</html>
